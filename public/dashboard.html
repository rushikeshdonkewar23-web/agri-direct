<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agri-Direct | Marketplace Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-emerald-700 text-white p-4 shadow-lg flex justify-between items-center px-4 md:px-8">
    <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">🌱 Agri-Direct Marketplace</h1>
    <div class="flex items-center gap-3">
      <span id="userInfo" class="font-medium bg-emerald-800 px-3 py-1.5 rounded-full text-xs md:text-sm"></span>
      <a id="addProductBtn" href="add-product.html" class="hidden bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-bold px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-xs md:text-sm transition">+ Add New Crop</a>
      <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-xs md:text-sm font-semibold transition">Logout</button>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl md:text-2xl font-bold text-gray-800">Available Fresh Crops & Produce</h2>
      <button onclick="fetchProducts()" class="text-sm bg-emerald-100 text-emerald-700 font-semibold px-3 py-1 rounded-lg hover:bg-emerald-200 transition">🔄 Refresh List</button>
    </div>
    
    <!-- Products Grid -->
    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
      <p class="text-gray-500 col-span-full text-center py-10">Loading products...</p>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('userData'));
    const token = localStorage.getItem('userToken');

    // Security Check: Token नसेल तर Login Page वर पाठवा
    if (!token || !user) {
      window.location.href = 'index.html';
    } else {
      // User Info Set Kara
      document.getElementById('userInfo').innerText = `${user.name} (${user.role})`;

      // Shetkari (Farmer) asel tar 'Add Product' button dakhav
      if (user.role === 'FARMER') {
        document.getElementById('addProductBtn').classList.remove('hidden');
      }
    }

    // Default Fallback Image
    const defaultImg = 'https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=500';

    // Load All Products
    async function fetchProducts() {
      const grid = document.getElementById('productsGrid');
      
      try {
        const res = await fetch('http://localhost:5000/api/products');
        const products = await res.json();

        grid.innerHTML = '';

        if (!products || products.length === 0) {
          grid.innerHTML = `
            <div class="col-span-full text-center py-12 bg-white rounded-xl border border-dashed border-gray-300">
              <p class="text-gray-500 font-medium">No crops or products listed yet.</p>
              ${user.role === 'FARMER' ? '<a href="add-product.html" class="inline-block mt-3 text-sm text-emerald-600 font-bold hover:underline">+ Add the first crop product</a>' : ''}
            </div>
          `;
          return;
        }

        products.forEach(p => {
          // Check for valid image URL or placeholder
          let imgUrl = p.image;
          if (!imgUrl || imgUrl.includes('placeholder') || imgUrl.trim() === '') {
            imgUrl = defaultImg;
          }

          grid.innerHTML += `
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 hover:shadow-xl transition flex flex-col justify-between">
              <div>
                <div class="relative h-48 w-full bg-gray-200">
                  <img src="${imgUrl}" 
                       onerror="this.onerror=null; this.src='${defaultImg}';" 
                       alt="${p.title}" 
                       class="w-full h-48 object-cover">
                  <span class="absolute top-3 right-3 bg-emerald-600 text-white text-xs px-2.5 py-1 rounded-full font-semibold shadow">
                    ${p.category || 'General'}
                  </span>
                </div>
                
                <div class="p-5">
                  <h3 class="text-lg font-bold text-gray-800 line-clamp-1">${p.title}</h3>
                  <p class="text-emerald-600 font-extrabold text-2xl mt-2">₹${p.price} <span class="text-sm font-normal text-gray-500">/ ${p.unit}</span></p>
                  
                  <div class="mt-3 space-y-1 text-sm text-gray-600">
                    <p class="flex items-center gap-1">📍 <span>Location: <b>${p.district || 'N/A'}</b></span></p>
                    <p class="flex items-center gap-1">📦 <span>Available: <b>${p.quantityAvailable} ${p.unit}</b></span></p>
                    <p class="flex items-center gap-1 text-xs text-gray-400 mt-2">👨‍🌾 Farmer: ${p.farmer ? p.farmer.name : 'Unknown'}</p>
                  </div>
                </div>
              </div>

              <div class="p-5 pt-0">
                ${user.role === 'BUYER' ? `
                  <button onclick="placeOrder('${p._id}', '${p.price}', '${p.unit}')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg transition shadow-md">
                    🛒 Buy / Order Now
                  </button>
                ` : `
                  <div class="text-xs text-center text-gray-400 bg-gray-50 py-2 rounded-lg font-medium">
                    (Farmer View Mode)
                  </div>
                `}
              </div>
            </div>
          `;
        });
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<p class="text-red-500 col-span-full text-center py-10">Failed to load products. Check server connection!</p>';
      }
    }

    // Place Order API Call (For Buyers)
    async function placeOrder(productId, price, unit) {
      const qty = prompt(`Enter quantity to buy (in ${unit}):`);
      if (!qty || isNaN(qty) || Number(qty) <= 0) {
        alert('Please enter a valid quantity!');
        return;
      }

      const address = prompt('Enter your delivery address:');
      if (!address || address.trim() === '') {
        alert('Delivery address is required!');
        return;
      }

      try {
        const res = await fetch('http://localhost:5000/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            productId,
            quantity: Number(qty),
            deliveryAddress: address
          })
        });

        const data = await res.json();
        if (res.ok) {
          alert(`🎉 Order Placed Successfully!\nTotal Bill: ₹${data.totalPrice}`);
          fetchProducts(); // Refresh list to update remaining quantity
        } else {
          alert(data.message || 'Order failed!');
        }
      } catch (err) {
        alert('Server Error during placing order!');
      }
    }

    // Logout Function
    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // Page start var products fetch kara
    fetchProducts();
  </script>
</body>
</html>
