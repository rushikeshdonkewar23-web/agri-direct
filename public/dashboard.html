<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agri-Direct | Marketplace Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-emerald-700 text-white p-4 shadow-lg flex justify-between items-center px-8">
    <h1 class="text-2xl font-bold">🌱 Agri-Direct Marketplace</h1>
    <div class="flex items-center gap-4">
      <span id="userInfo" class="font-medium bg-emerald-800 px-3 py-1 rounded-full text-sm"></span>
      <a id="addProductBtn" href="add-product.html" class="hidden bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-bold px-4 py-2 rounded-lg text-sm transition">+ Add New Crop</a>
      <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-semibold transition">Logout</button>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="max-w-6xl mx-auto p-6">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Available Fresh Crops & Produce</h2>
    
    <!-- Products Grid -->
    <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <p class="text-gray-500">Loading products...</p>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('userData'));
    const token = localStorage.getItem('userToken');

    if (!token) {
      window.location.href = 'index.html';
    }

    // User Info Set Kara
    document.getElementById('userInfo').innerText = `${user.name} (${user.role})`;

    // Shetkari asel tar 'Add Product' button dakhav
    if (user.role === 'FARMER') {
      document.getElementById('addProductBtn').classList.remove('hidden');
    }

    // Load All Products
    async function fetchProducts() {
      try {
        const res = await fetch('http://localhost:5000/api/products');
        const products = await res.json();

        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';

        if (products.length === 0) {
          grid.innerHTML = '<p class="text-gray-500">No products listed yet.</p>';
          return;
        }

        products.forEach(p => {
          grid.innerHTML += `
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 hover:shadow-lg transition">
              <img src="${p.image || 'https://via.placeholder.com/300'}" class="w-full h-48 object-cover">
              <div class="p-5">
                <div class="flex justify-between items-start">
                  <h3 class="text-xl font-bold text-gray-800">${p.title}</h3>
                  <span class="bg-emerald-100 text-emerald-800 text-xs px-2.5 py-1 rounded-full font-semibold">${p.category}</span>
                </div>
                <p class="text-emerald-600 font-bold text-2xl mt-2">₹${p.price} <span class="text-sm font-normal text-gray-500">/ ${p.unit}</span></p>
                <p class="text-gray-600 text-sm mt-1">📍 ${p.district} | Available: <b>${p.quantityAvailable} ${p.unit}</b></p>
                <p class="text-xs text-gray-400 mt-2">👨‍🌾 Farmer: ${p.farmer ? p.farmer.name : 'Unknown'}</p>
                
                ${user.role === 'BUYER' ? `
                  <button onclick="placeOrder('${p._id}')" class="mt-4 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg transition">
                    Buy / Order Now
                  </button>
                ` : ''}
              </div>
            </div>
          `;
        });
      } catch (err) {
        console.error(err);
      }
    }

    // Place Order API Call
    async function placeOrder(productId) {
      const qty = prompt('Enter quantity to buy:');
      if (!qty) return;

      const address = prompt('Enter delivery address:');
      if (!address) return;

      try {
        const res = await fetch('http://localhost:5000/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            productId,
            quantity: Number(qty),
            deliveryAddress: address
          })
        });

        const data = await res.json();
        if (res.ok) {
          alert('🎉 Order Placed Successfully!');
          fetchProducts();
        } else {
          alert(data.message || 'Order failed!');
        }
      } catch (err) {
        alert('Server Error!');
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    fetchProducts();
  </script>
</body>
</html>
