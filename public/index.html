<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agri-Direct | Quick Mobile Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-3xl shadow-xl border border-slate-100 w-full max-w-md p-8">
    
    <!-- Header Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-emerald-100 text-emerald-800 text-3xl font-extrabold rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-sm border border-emerald-200">
        🌱
      </div>
      <h2 class="text-2xl font-extrabold text-slate-800">Agri-Direct</h2>
      <p class="text-slate-500 text-xs mt-1">Directly Connecting Farmers & Buyers</p>
    </div>

    <!-- Step 1: Mobile Number & Gmail Form -->
    <div id="phoneStep" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Mobile Number / मोबाईल नंबर</label>
        <div class="flex gap-2">
          <span class="bg-slate-100 text-slate-600 font-bold px-3 py-2.5 rounded-xl border border-slate-300 text-sm flex items-center">
            🇮🇳 +91
          </span>
          <input type="tel" id="mobileInput" placeholder="Enter 10-digit mobile number" maxlength="10" class="w-full p-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none font-semibold text-slate-800 text-sm">
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Your Full Name / पूर्ण नाव</label>
        <input type="text" id="nameInput" placeholder="Enter your full name" class="w-full p-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-semibold">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Email ID / ईमेल आयडी</label>
        <input type="email" id="emailInput" placeholder="example@gmail.com" class="w-full p-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-semibold">
      </div>

      <button onclick="sendOTP()" id="sendOtpBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-md text-sm mt-2">
        Get OTP / ओ.टी.पी मिळवा 📲
      </button>
    </div>

    <!-- Step 2: OTP Verification Form -->
    <div id="otpStep" class="hidden space-y-4">
      <div class="bg-emerald-50 border border-emerald-200 p-3 rounded-xl text-center">
        <p class="text-xs text-emerald-800">
          OTP sent to <b id="displayPhone" class="font-bold">+91 XXXXXXXX</b>
        </p>
        <p class="text-[10px] text-emerald-600 font-semibold mt-0.5">Test OTP is: <span class="bg-emerald-200 px-1.5 py-0.5 rounded font-mono font-extrabold text-emerald-900">1234</span></p>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Enter 4-Digit OTP</label>
        <input type="text" id="otpInput" maxlength="4" placeholder="1234" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-slate-800 text-center text-xl tracking-widest">
      </div>

      <button onclick="verifyOTP()" id="verifyOtpBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-md text-sm">
        Verify & Login / लॉगिन करा 🚀
      </button>

      <button onclick="backToPhone()" class="w-full text-xs font-bold text-slate-500 hover:text-slate-700 text-center block pt-1">
        ← Change Details
      </button>
    </div>

  </div>

  <script>
    if (localStorage.getItem('userToken')) {
      window.location.href = 'dashboard.html';
    }

    function sendOTP() {
      const phone = document.getElementById('mobileInput').value;
      const name = document.getElementById('nameInput').value;
      const email = document.getElementById('emailInput').value;

      if (!phone || phone.length !== 10) {
        alert('कृपया १० अंकी मोबाईल नंबर टाका!');
        return;
      }

      if (!name) {
        alert('कृपया तुमचे नाव टाका!');
        return;
      }

      if (!email) {
        alert('कृपया तुमचा ईमेल आयडी टाका!');
        return;
      }

      document.getElementById('displayPhone').innerText = `+91 ${phone}`;
      document.getElementById('phoneStep').classList.add('hidden');
      document.getElementById('otpStep').classList.remove('hidden');
    }

    function backToPhone() {
      document.getElementById('otpStep').classList.add('hidden');
      document.getElementById('phoneStep').classList.remove('hidden');
    }

    function verifyOTP() {
      const otp = document.getElementById('otpInput').value;
      const phone = document.getElementById('mobileInput').value;
      const name = document.getElementById('nameInput').value;
      const email = document.getElementById('emailInput').value;

      if (otp === '1234' || otp.length === 4) {
        const userData = {
          id: 'user_' + phone,
          name: name,
          phone: phone,
          email: email,
          role: 'FARMER',
          district: 'Nanded'
        };

        localStorage.setItem('userData', JSON.stringify(userData));
        localStorage.setItem('userToken', 'mobile_auth_token_' + Date.now());

        alert('🎉 Mobile Login Successful!');
        window.location.href = 'dashboard.html';
      } else {
        alert('गलत OTP! कृपया 1234 टाका.');
      }
    }
  </script>
</body>
</html>
