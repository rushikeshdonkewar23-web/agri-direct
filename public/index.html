<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agri-Direct | Login & Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-emerald-100">
    
    <!-- Logo & Title -->
    <div class="text-center mb-6">
      <div class="flex justify-center items-center gap-2 mb-2">
        <span class="text-3xl">🌱</span>
        <h1 class="text-3xl font-bold text-emerald-800">Agri-Direct</h1>
      </div>
      <p class="text-gray-500 text-sm">Directly Connecting Farmers & Buyers</p>
    </div>

    <!-- Toggle Buttons -->
    <div class="flex bg-emerald-100/60 p-1 rounded-xl mb-6">
      <button id="showLoginBtn" onclick="toggleAuth('login')" 
        class="w-1/2 py-2 rounded-lg font-medium text-sm transition bg-emerald-600 text-white shadow-sm">
        Login
      </button>
      <button id="showRegisterBtn" onclick="toggleAuth('register')" 
        class="w-1/2 py-2 rounded-lg font-medium text-sm transition text-gray-600 hover:text-emerald-800">
        Register
      </button>
    </div>

    <!-- Alert Box for Errors / Success -->
    <div id="alertBox" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email Address</label>
        <input type="email" id="loginEmail" required 
          class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="loginPassword" required 
          class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <button type="submit" 
        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-md transition">
        Login to Portal
      </button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700">Full Name</label>
        <input type="text" id="regName" required 
          class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Email Address</label>
        <input type="email" id="regEmail" required 
          class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="regPassword" required 
          class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">User Role</label>
        <select id="regRole" class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
          <option value="farmer">Farmer (शेतकरी)</option>
          <option value="buyer">Buyer (व्यापारी / ग्राहक)</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">District</label>
        <input type="text" id="regDistrict" required 
          class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <button type="submit" 
        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-md transition">
        Create Account
      </button>
    </form>

  </div>

  <!-- JAVASCRIPT LOGIC -->
  <script>
    // Relative API Base URL (Works on Localhost & Render automatically)
    const API_URL = '/api/auth';

    // Toggle Between Login & Register Forms
    function toggleAuth(type) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const showLoginBtn = document.getElementById('showLoginBtn');
      const showRegisterBtn = document.getElementById('showRegisterBtn');

      hideAlert();

      if (type === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        showLoginBtn.className = "w-1/2 py-2 rounded-lg font-medium text-sm transition bg-emerald-600 text-white shadow-sm";
        showRegisterBtn.className = "w-1/2 py-2 rounded-lg font-medium text-sm transition text-gray-600 hover:text-emerald-800";
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        showRegisterBtn.className = "w-1/2 py-2 rounded-lg font-medium text-sm transition bg-emerald-600 text-white shadow-sm";
        showLoginBtn.className = "w-1/2 py-2 rounded-lg font-medium text-sm transition text-gray-600 hover:text-emerald-800";
      }
    }

    // Display Alert Messages
    function showAlert(message, isError = true) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = message;
      alertBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-emerald-100', 'text-emerald-700');
      
      if (isError) {
        alertBox.classList.add('bg-red-100', 'text-red-700');
      } else {
        alertBox.classList.add('bg-emerald-100', 'text-emerald-700');
      }
    }

    function hideAlert() {
      document.getElementById('alertBox').classList.add('hidden');
    }

    // Handle Login Submit
    async function handleLogin(event) {
      event.preventDefault();
      hideAlert();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          showAlert("Login Successful! Redirecting...", false);
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          showAlert(data.message || 'Login failed!');
        }
      } catch (err) {
        console.error("Login Error:", err);
        showAlert("Server connection error!");
      }
    }

    // Handle Register Submit
    async function handleRegister(event) {
      event.preventDefault();
      hideAlert();

      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;
      const district = document.getElementById('regDistrict').value;

      try {
        const response = await fetch(`${API_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role, district })
        });

        const data = await response.json();

        if (response.ok) {
          showAlert("Account created successfully! Please login.", false);
          setTimeout(() => toggleAuth('login'), 1500);
        } else {
          showAlert(data.message || 'Registration failed!');
        }
      } catch (err) {
        console.error("Register Error:", err);
        showAlert("Server connection error!");
      }
    }
  </script>
</body>
</html>
