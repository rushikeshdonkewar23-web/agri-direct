<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agri-Direct | Login & Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-emerald-100">
    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-emerald-700">🌱 Agri-Direct</h1>
      <p class="text-gray-500 text-sm mt-1">Directly Connecting Farmers & Buyers</p>
    </div>

    <!-- Toggle Buttons -->
    <div class="flex bg-emerald-100 p-1 rounded-xl mb-6">
      <button id="showLoginBtn" onclick="toggleAuth('login')" class="w-1/2 py-2 text-sm font-semibold rounded-lg bg-emerald-600 text-white shadow">Login</button>
      <button id="showRegisterBtn" onclick="toggleAuth('register')" class="w-1/2 py-2 text-sm font-semibold rounded-lg text-emerald-800">Register</button>
    </div>

    <!-- Message Alert -->
    <div id="alertBox" class="hidden mb-4 p-3 rounded-lg text-sm font-medium"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email Address</label>
        <input type="email" id="loginEmail" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="example@gmail.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="loginPassword" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="••••••••">
      </div>
      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-md transition">Login to Portal</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700">Full Name</label>
        <input type="text" id="regName" required class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Rushikesh">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="regEmail" required class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500" placeholder="rushi@gmail.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Phone</label>
        <input type="text" id="regPhone" required class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500" placeholder="9822554979">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="regPassword" required class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500" placeholder="••••••••">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Role</label>
        <select id="regRole" class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
          <option value="FARMER">Shetkari (Farmer)</option>
          <option value="BUYER">Grahak (Buyer)</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">District</label>
        <input type="text" id="regDistrict" required class="w-full mt-1 p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Nanded">
      </div>
      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-md transition">Create Account</button>
    </form>
  </div>

  <script>
    const API_URL = '';
    
    function toggleAuth(type) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const showLoginBtn = document.getElementById('showLoginBtn');
      const showRegisterBtn = document.getElementById('showRegisterBtn');

      if (type === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        showLoginBtn.className = "w-1/2 py-2 text-sm font-semibold rounded-lg bg-emerald-600 text-white shadow";
        showRegisterBtn.className = "w-1/2 py-2 text-sm font-semibold rounded-lg text-emerald-800";
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        showRegisterBtn.className = "w-1/2 py-2 text-sm font-semibold rounded-lg bg-emerald-600 text-white shadow";
        showLoginBtn.className = "w-1/2 py-2 text-sm font-semibold rounded-lg text-emerald-800";
      }
    }

    function showAlert(msg, isError = false) {
      const alert = document.getElementById('alertBox');
      alert.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
      if (isError) {
        alert.classList.add('bg-red-100', 'text-red-700');
      } else {
        alert.classList.add('bg-green-100', 'text-green-700');
      }
      alert.innerText = msg;
    }

    // LOGIN API CALL
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('userToken', data.token);
          localStorage.setItem('userData', JSON.stringify(data));
          showAlert('Login successful! Redirecting...');
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
        } else {
          showAlert(data.message || 'Login failed', true);
        }
      } catch (err) {
        showAlert('Server connection error!', true);
      }
    }

    // REGISTER API CALL
    async function handleRegister(e) {
      e.preventDefault();
      const body = {
        name: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        phone: document.getElementById('regPhone').value,
        password: document.getElementById('regPassword').value,
        role: document.getElementById('regRole').value,
        district: document.getElementById('regDistrict').value
      };

      try {
        const res = await fetch(`${API_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (res.ok) {
          showAlert('Registration successful! Please login now.');
          toggleAuth('login');
        } else {
          showAlert(data.message || 'Registration failed', true);
        }
      } catch (err) {
        showAlert('Server connection error!', true);
      }
    }
  </script>
</body>
</html>
