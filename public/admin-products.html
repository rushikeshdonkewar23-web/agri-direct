<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agri-Direct | Admin Produce Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6 md:p-10">

  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="bg-slate-900 text-white p-6 rounded-2xl shadow-lg flex justify-between items-center mb-8">
      <div>
        <h1 class="text-2xl font-bold flex items-center gap-2">
          🌾 Admin Crops Management
        </h1>
        <p class="text-xs text-slate-400 mt-1">Delete broken, blank, or unwanted crop listings directly</p>
      </div>
      <div class="flex gap-2">
        <a href="admin-users.html" class="bg-slate-800 border border-slate-700 hover:bg-slate-700 text-white font-bold px-3.5 py-2 rounded-xl text-xs transition">
          👥 Manage Users
        </a>
        <a href="dashboard.html" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-xl text-xs transition">
          ← Dashboard
        </a>
      </div>
    </div>

    <!-- Stats -->
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-slate-800">All Listed Produce</h3>
      <span id="productCountBadge" class="bg-emerald-100 text-emerald-800 font-bold text-xs px-3 py-1 rounded-full">
        0 Crops
      </span>
    </div>

    <!-- Crops Grid -->
    <div id="cropsAdminGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <p class="text-slate-400 col-span-full">Loading all crop listings...</p>
    </div>
  </div>

  <script>
    async function fetchAllCrops() {
      try {
        const res = await fetch('/api/products');
        const products = await res.json();
        renderCrops(products);
      } catch (err) {
        console.error("Fetch Error:", err);
      }
    }

    function renderCrops(products) {
      const grid = document.getElementById('cropsAdminGrid');
      const badge = document.getElementById('productCountBadge');
      grid.innerHTML = '';

      if (!products || products.length === 0) {
        badge.innerText = '0 Crops';
        grid.innerHTML = `<p class="col-span-full text-slate-400 font-semibold py-8">No crops found in marketplace.</p>`;
        return;
      }

      badge.innerText = `${products.length} Crops Listed`;

      products.forEach(p => {
        const imageUrl = (p.image && p.image.length > 20) 
          ? p.image 
          : 'https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=400';

        grid.innerHTML += `
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex flex-col justify-between">
            <div>
              <img src="${imageUrl}" onerror="this.src='https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=400'" class="w-full h-36 object-cover rounded-xl mb-3">
              <h4 class="font-bold text-slate-800 text-base leading-snug">${p.title}</h4>
              <p class="text-emerald-600 font-extrabold text-lg mt-1">₹${p.price} / ${p.unit}</p>
              <p class="text-xs text-slate-500 mt-2">📍 District: <b>${p.district || 'N/A'}</b></p>
              <p class="text-[10px] text-slate-400 mt-0.5 truncate">ID: ${p._id}</p>
            </div>

            <button onclick="deleteCrop('${p._id}', '${p.title}')" class="w-full mt-4 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-bold py-2 rounded-xl text-xs transition">
              🗑️ Delete This Crop
            </button>
          </div>
        `;
      });
    }

    async function deleteCrop(id, title) {
      if (!confirm(`Are you sure you want to delete "${title}" from marketplace?`)) return;

      try {
        const res = await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
        if (res.ok) {
          alert('🗑️ Crop deleted successfully!');
          fetchAllCrops();
        } else {
          alert('Failed to delete crop');
        }
      } catch (err) {
        alert('Server Error during deletion');
      }
    }

    fetchAllCrops();
  </script>
</body>
</html>
