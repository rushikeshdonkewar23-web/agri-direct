<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agri-Direct | My Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

  <div>
    <!-- Navbar -->
    <nav class="bg-emerald-800 text-white p-4 shadow-lg flex justify-between items-center px-6 md:px-12">
      <h1 class="text-2xl font-bold flex items-center gap-2">
        <span>🌱</span> Agri-Direct
      </h1>
      <div class="flex items-center gap-4">
        <a href="dashboard.html" class="bg-emerald-700 hover:bg-emerald-600 border border-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-semibold transition">
          ← Back to Dashboard
        </a>
      </div>
    </nav>

    <!-- Main Container -->
    <div class="max-w-6xl mx-auto p-6 md:p-8">
      
      <!-- User Info Card -->
      <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div class="flex items-center gap-4">
          <div class="w-16 h-16 bg-emerald-100 text-emerald-800 font-extrabold text-2xl rounded-2xl flex items-center justify-center border border-emerald-200">
            👨‍🌾
          </div>
          <div>
            <h2 id="userName" class="text-2xl font-bold text-slate-800">Loading...</h2>
            <p id="userRole" class="text-xs font-semibold bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full inline-block mt-1"></p>
            <p id="userEmail" class="text-xs text-slate-500 mt-1"></p>
          </div>
        </div>

        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-xs text-slate-600 space-y-1 w-full md:w-auto">
          <p>📍 District: <b id="userDistrict" class="text-slate-800">Maharashtra</b></p>
          <p>🔒 Account Status: <b class="text-emerald-600">Active Verified</b></p>
        </div>
      </div>

      <!-- My Listed Crops Section -->
      <div class="flex justify-between items-center mb-6 border-b pb-3">
        <h3 class="text-xl font-bold text-slate-800">My Listed Crops & Produce 🌾</h3>
        <span id="myProductCount" class="text-xs font-semibold bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full">0 Crops</span>
      </div>

      <div id="myProductsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <p class="text-slate-500 col-span-full">Loading your listed crops...</p>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-slate-900 text-slate-400 py-6 text-center border-t border-slate-800 mt-12">
    <p class="text-sm font-medium">
      Designed & Developed with ❤️ by <span class="text-emerald-400 font-bold">Rushikesh Donkewar</span>
    </p>
    <p class="text-xs text-slate-500 mt-1">© 2026 Agri-Direct Marketplace • Farmer Profile</p>
  </footer>

  <script>
    const user = JSON.parse(localStorage.getItem('userData'));
    const token = localStorage.getItem('userToken');

    if (!token || !user) {
      window.location.href = 'index.html';
    }

    // Populate Profile Info
    document.getElementById('userName').innerText = user.name;
    document.getElementById('userRole').innerText = `${user.role} ACCOUNT`;
    document.getElementById('userEmail').innerText = `📧 ${user.email}`;
    if (user.district) {
      document.getElementById('userDistrict').innerText = user.district;
    }

    // Fetch Farmer's Own Products
    async function fetchMyProducts() {
      try {
        const res = await fetch('/api/products');
        const allProducts = await res.json();

        // Filter products added by this farmer
        const myProducts = allProducts.filter(p => p.farmer && (p.farmer._id === user.id || p.farmer === user.id || p.farmer.email === user.email));

        renderMyProducts(myProducts);
      } catch (err) {
        console.error("Fetch error:", err);
      }
    }

    function renderMyProducts(products) {
      const grid = document.getElementById('myProductsGrid');
      const countBadge = document.getElementById('myProductCount');
      grid.innerHTML = '';
      countBadge.innerText = `${products.length} Crops`;

      if (!products || products.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full py-12 text-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-300">
            <p class="text-lg font-semibold">You haven't listed any crops yet.</p>
            <a href="add-product.html" class="inline-block mt-3 bg-emerald-600 text-white font-bold px-4 py-2 rounded-xl text-xs hover:bg-emerald-700 transition">
              + Add Your First Crop
            </a>
          </div>
        `;
        return;
      }

      products.forEach(p => {
        const imageUrl = p.image || 'https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=400';

        grid.innerHTML += `
          <div class="bg-white rounded-2xl shadow-sm hover:shadow-md transition overflow-hidden border border-slate-100 flex flex-col justify-between">
            <div>
              <div class="relative">
                <img src="${imageUrl}" alt="${p.title}" class="w-full h-44 object-cover">
                <span class="absolute top-3 right-3 bg-emerald-800/90 backdrop-blur-md text-white text-xs px-2.5 py-1 rounded-full font-bold shadow-sm">
                  ${p.category}
                </span>
              </div>
              <div class="p-4">
                <h4 class="text-base font-bold text-slate-800 capitalize leading-snug">${p.title}</h4>
                <p class="text-emerald-600 font-extrabold text-xl mt-1">
                  ₹${p.price} <span class="text-xs font-semibold text-slate-400">/ ${p.unit}</span>
                </p>
                <p class="text-xs text-slate-500 mt-2">📦 Available: <b>${p.quantityAvailable} ${p.unit}</b></p>
                <p class="text-xs text-slate-500">📍 Location: <b>${p.district}</b></p>
              </div>
            </div>

            <div class="p-4 pt-0">
              <button onclick="deleteProduct('${p._id}')" class="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-bold py-2 rounded-xl text-xs transition flex items-center justify-center gap-1">
                🗑️ Delete Crop
              </button>
            </div>
          </div>
        `;
      });
    }

    // Delete Product API Call
    async function deleteProduct(productId) {
      if (!confirm('Are you sure you want to delete this crop listing?')) return;

      try {
        const res = await fetch(`/api/products/${productId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const data = await res.json();
        if (res.ok) {
          alert('🗑️ Crop deleted successfully!');
          fetchMyProducts();
        } else {
          alert(data.message || 'Failed to delete crop');
        }
      } catch (err) {
        alert('Server Error during deletion!');
      }
    }

    fetchMyProducts();
  </script>
</body>
</html>
